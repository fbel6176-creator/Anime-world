<!DOCTYPE html>
<html>
<head>
<title>Anime World</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#f97316;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#f97316;
}

/* SEARCH */

.search{
text-align:center;
padding:20px;
background:#181818;
}

.search input{
width:60%;
padding:10px;
border-radius:5px;
border:none;
}

/* BANNER */

.banner{
background:#111827;
padding:60px;
text-align:center;
}

.banner h1{
font-size:40px;
}

/* SECTION */

.section-title{
margin-left:20px;
margin-top:30px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* ANIME CARD */

.anime{
width:200px;
margin:15px;
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.anime:hover{
transform:scale(1.05);
}

.anime img{
width:100%;
}

.anime h3{
padding:10px;
}

/* VIDEO */

.video{
text-align:center;
margin:30px;
}

/* FOOTER */

footer{
background:#111;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>
</head>

<body>

<header>

<div class="logo">Anime World</div>

<nav>
<a href="#">Accueil</a>
<a href="#">Anime</a>
<a href="#">Actualités</a>
<a href="#">Images</a>
<a href="#">Musiques</a>
</nav>

</header>

<div class="search">
<input type="text" placeholder="Rechercher un anime...">
</div>

<div class="banner">
<h1>Bienvenue sur Anime World</h1>
<p>Découvre les meilleurs anime et leurs musiques</p>
</div>

<h2 class="section-title">🔥 Anime populaires</h2>

<section class="container">

<div class="anime">
<img src="mha.jpg">
<h3>My Hero Academia</h3>
</div>

<div class="anime">
<img src="jjk.jpg">
<h3>Jujutsu Kaisen</h3>
</div>

<div class="anime">
<img src="naruto.jpg">
<h3>Naruto</h3>
</div>

<div class="anime">
<img src="aot.jpg">
<h3>Attack on Titan</h3>
</div>

</section>

<h2 class="section-title">🎵 Opening Anime</h2>

<div class="video">

<iframe width="560" height="315"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<footer>
Anime World © 2026
</footer>

</body>
</html>
